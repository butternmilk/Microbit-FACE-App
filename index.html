<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f28c28">
    <title>Micro:Bit Face Tracking</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=compact-metrics-half-height">
</head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="Camera face tracking view">
        <div class="video-frame">
          <video id="camera" playsinline muted autoplay></video>
          <canvas id="overlay" aria-hidden="true"></canvas>
          <div id="emptyState" class="empty-state">
            <strong>Camera paused</strong>
            <span>Tap start to begin face tracking.</span>
          </div>
          <div class="sp-brand" aria-label="Singapore Polytechnic">
            <img src="SP_Logo.png" alt="Singapore Polytechnic">
          </div>
          <div class="floating-tools" aria-label="Camera controls">
            <button id="cameraButton" class="round-button is-camera-off" type="button" title="Start camera" aria-label="Start camera" data-fullscreen-label="Start">
              <span class="icon-camera" aria-hidden="true"></span>
            </button>
            <button id="switchCameraButton" class="round-button" type="button" title="Switch camera" aria-label="Switch camera" data-fullscreen-label="Switch camera">
              <span class="icon-switch-camera" aria-hidden="true"></span>
            </button>
            <button id="fullscreenButton" class="round-button" type="button" title="Fullscreen" aria-label="Fullscreen" data-fullscreen-label="Full-screen">
              <span class="icon-fullscreen" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </section>

      <section class="panel" aria-label="Tracking controls and values">
        <header class="panel-header">
          <div>
            <p class="eyebrow">BBC Micro:Bit</p>
            <h1>Face Tracking Controller</h1>
          </div>
          <div id="statusPill" class="status-pill">Idle</div>
        </header>

        <div class="actions" aria-label="Connection controls">
          <button id="connectButton" class="primary-action" type="button">
            <span class="icon-bluetooth" aria-hidden="true"></span>
            Connect
          </button>
          <button id="calibrateButton" class="secondary-action" type="button" disabled>
            <span class="icon-target" aria-hidden="true"></span>
            Calibrate
          </button>
        </div>

        <div id="supportNotice" class="notice" hidden></div>

        <div id="metricsGrid" class="metrics-grid" aria-label="Face tracking values"></div>
      </section>
    </main>

    <script type="module" src="app.js?v=calibration-bold-normal-thin-overlay"></script>
  </body>
</html>
